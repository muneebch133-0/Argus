version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
  - package-ecosystem: pip
    directory: /services/ai
    schedule:
      interval: weekly
      day: monday
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
  - package-ecosystem: docker
    directory: /services/ai
    schedule:
      interval: weekly
      day: monday
