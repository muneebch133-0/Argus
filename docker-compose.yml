services:
  argus:
    build: .
    ports:
      - "8787:8787"
    environment:
      NODE_ENV: production
      PORT: 8787
      ARGUS_LIVE_INTELLIGENCE: "false"
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
